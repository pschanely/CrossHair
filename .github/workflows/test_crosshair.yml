name: Test CrossHair

on:
  push:
    branches:
      - main
    paths:
      - crosshair/**
      - pyproject.toml
      - .pre-commit-config.yaml

  pull_request:
    paths:
      - crosshair/**
      - pyproject.toml
      - .pre-commit-config.yaml

jobs:
  test_crosshair:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    # The steps below use bash syntax (inline VAR=val prefixes); force bash on
    # every OS so the Windows runner doesn't fall back to PowerShell.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: [
          # 3.8 and 3.9 aren't tested: our dev tooling (black, isort, mypy,
          # pytest) requires >=3.10 so the [dev] extra won't install. The
          # runtime package still supports them (see wheels + classifiers).
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "3.14",
        ]
        include:
          # Python 3.15 is still in beta (and z3-solver may not yet publish
          # 3.15 wheels), so allow this job to fail while support stabilizes.
          - os: ubuntu-24.04
            python-version: "3.15-dev"
            experimental: true
          # Windows: heavy symbolic-execution tests can let a single z3 query
          # overrun its soft wall-clock timeout and wedge the run, so we bound
          # solver work deterministically with a z3 rlimit budget
          # (CROSSHAIR_SMT_RLIMIT, applied only here). We test the low and high
          # ends of the supported span (3.11 and 3.14) rather than the full Linux
          # matrix. The low version is 3.11, NOT 3.10: on 3.10 the CPython
          # PREDICT() opcode-prediction macro -- compiled in only on MSVC, which
          # lacks computed gotos -- swallows the predicted instruction's trace
          # event, so CALL-opcode interception and post-op callbacks silently
          # drop and symbolic execution breaks on Windows. 3.11 guards PREDICT
          # with the tracing flag upstream (bpo-43760), so 3.11+ is clean; 3.10
          # is EOL and won't be fixed upstream. See the Windows+3.10 tracer
          # investigation for details.
          - os: windows-latest
            python-version: "3.11"
            smt_rlimit: "200000000"
            experimental: true
          - os: windows-latest
            python-version: "3.14"
            smt_rlimit: "200000000"
            experimental: true

    steps:
      - uses: actions/checkout@main

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@main
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip setuptools
          # Vanilla install and smoke test, just to make sure we do
          # not accidentally add an import for a [dev] dependency:
            pip3 install -e .
          crosshair -h
          # Now add the dev dependencies, so we can use them for testing.
          pip3 install -e .[dev]

      - name: Run pre-commit checks
        # Linting is platform-independent; run it once (on Linux) to keep the
        # Windows job focused on the test suite.
        if: runner.os == 'Linux'
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Run pytest suite
        env:
          # Empty on non-Windows entries -> feature off (parsed as 0).
          CROSSHAIR_SMT_RLIMIT: ${{ matrix.smt_rlimit || '' }}
        run: |
          CROSSHAIR_EXTRA_ASSERTS=1 PYTHONHASHSEED=0 python -m pytest -n auto --dist worksteal crosshair
